<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joystick Zoom & Shake</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Layar Video */
        #video { 
            position: relative;
            top: -50px;
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            transition: transform 0.1s ease-out; /* Biar zoom terasa halus */
        }

        /* Efek Getar (Shake) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        .shaking {
            animation: shake 0.2s infinite;
        }

        /* Wadah Joystick di Kiri */
        #joystick-container { 
            position: absolute; 
            bottom: 50px; 
            left: 20px; /* Posisi di kiri */
            width: 150px; 
            height: 150px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 50%; 
        }

        #info { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            background: rgba(0,0,0,0.7); 
            padding: 10px; 
            border-radius: 5px;
            z-index: 10;
        }
        
        
        @keyframes punch {
            0% {
                transform: translateY(200px);
            }
            100% {
                transform: translateY(-200px);
            }
        }
        
        #fist {
            position: relative;
            left: 450px;
            width: 300px;
            animation: punch 0.5s
            ease-in infinite alternate;
        }
        
        #bo {
            width: 50px;
            height: 50px;
            position: relative;
            left: 650px;
            top: 150px;
            border-radius: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>
<button type="button" id="bo">Punch</button>
    <div id="info">zoom <span id="zoom-val">1.0</span>x</div>
    <video id="video" autoplay playsinline></video>
    <div id="joystick-container"></div>
<img src="fist.png" id="fist" hidden/>

    <script>
        const video = document.getElementById('video');
        const zoomText = document.getElementById('zoom-val');
        let videoTrack = null;
        let currentZoom = 1.0;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                
                const caps = videoTrack.getCapabilities();
                if (!caps.zoom) {
                    console.log("Hardware tidak mendukung zoom API");
                }
            } catch (err) {
                alert("Akses kamera ditolak. Pastikan pakai HTTPS!");
            }
        }

        // Setting Joystick Analog (Warna Hitam)
        const options = {
            zone: document.getElementById('joystick-container'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#000000', // Warna Hitam
            size: 100
        };

        const manager = nipplejs.create(options);

        manager.on('move', (evt, data) => {
            if (!videoTrack) return;

            const caps = videoTrack.getCapabilities();
            
            // data.vector.y: positif ke atas (maju), negatif ke bawah (mundur)
            const yDir = data.vector.y;

            if (yDir > 0.3) { 
                // MAJU: Zoom In + Shake
                video.classList.add('shaking');
                if (caps.zoom) {
                    currentZoom = Math.min(caps.zoom.max, currentZoom + 0.05);
                }
            } else if (yDir < -0.3) {
                // MUNDUR: Zoom Out (Matikan shake)
                video.classList.remove('shaking');
                if (caps.zoom) {
                    currentZoom = Math.max(caps.zoom.min, currentZoom - 0.05);
                }
            } else {
                // Berhenti: Matikan shake
                video.classList.remove('shaking');
            }

            // Terapkan zoom jika didukung
            if (caps.zoom) {
                videoTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] });
                zoomText.innerText = currentZoom.toFixed(1);
            }
        });

        // Matikan shake saat joystick dilepas
        manager.on('end', () => {
            video.classList.remove('shaking');
        });

        initCamera();
        
        document.getElementById("bo").onclick = function (){
            document.getElementById("fist").hidden = false;
            setTimeout(() => {
    document.getElementById("fist").hidden = true;
}, 2000);
        }
    </script>
</body>
</html>
